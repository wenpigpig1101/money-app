<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💰 向錢衝</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 載入 Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- PWA 設定 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#C3A995">
  
  <style>
    ::-webkit-scrollbar { display: none; }
    body { 
      -ms-overflow-style: none; scrollbar-width: none; 
      background-color: #FDFBF7; color: #5C4D42; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }
    .pb-safe { padding-bottom: calc(6.5rem + env(safe-area-inset-bottom)); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    
    input[type="date"] {
      -webkit-appearance: none;
      min-height: 3rem;

</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const THEME = { primary: '#C3A995', secondary: '#E3D5CA', bg: '#FDFBF7', textMain: '#5C4D42' };

    // 統一的輸入框樣式
    const INPUT_STYLE = "w-full block min-w-0 bg-white p-3 border border-gray-200 rounded-xl outline-none focus:border-[#C3A995] focus:ring-1 focus:ring-[#C3A995] text-left text-gray-800";

    const getTodayString = () => new Date().toISOString().split('T')[0];
    const generateId = () => Math.random().toString(36).substr(2, 9);
    const formatWeekDay = (dateStr) => {
      if (!dateStr) return '';
      const days = ['日', '一', '二', '三', '四', '五', '六'];
      return `${dateStr} (週${days[new Date(dateStr + 'T00:00:00').getDay()]})`;
    };

    function App() {
      const [activeTab, setActiveTab] = useState('store');
      
      const [toastMsg, setToastMsg] = useState('');
      const [showSettings, setShowSettings] = useState(false);
      const [modalStoreType, setModalStoreType] = useState('7-11'); 
      const [modalConfig, setModalConfig] = useState({ isOpen: false, title: '', message: '', confirmText: '確定', isDanger: false, showStoreSelect: false, onConfirm: null });

      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); };
      
      const showModal = ({ title, message, confirmText = '確定', isDanger = false, showStoreSelect = false, onConfirm }) => {
        setModalStoreType('7-11');
        setModalConfig({
          isOpen: true, title, message, confirmText, isDanger, showStoreSelect,
          onConfirm: () => {
            if (onConfirm) onConfirm(modalStoreType); 
            setModalConfig(prev => ({ ...prev, isOpen: false }));
          }
        });
      };

      const [storeRecords, setStoreRecords] = useState(() => JSON.parse(localStorage.getItem('xq_store') || '[]'));
      const [marketRecords, setMarketRecords] = useState(() => JSON.parse(localStorage.getItem('xq_market') || '[]'));
      const [reserveRecords, setReserveRecords] = useState(() => JSON.parse(localStorage.getItem('xq_reserve') || '[]'));

      useEffect(() => localStorage.setItem('xq_store', JSON.stringify(storeRecords)), [storeRecords]);
      useEffect(() => localStorage.setItem('xq_market', JSON.stringify(marketRecords)), [marketRecords]);
      useEffect(() => localStorage.setItem('xq_reserve', JSON.stringify(reserveRecords)), [reserveRecords]);

      const handleTransferToStore = (data) => {
        const fee = data.storeType === '7-11' ? 38 : 39;
        const newRecord = { id: generateId(), date: getTodayString(), name: data.name, amount: data.amount, storeType: data.storeType, isFreeShipping: false, shippingFee: fee, status: 'pending' };
        setStoreRecords(prev => [newRecord, ...prev].sort((a, b) => new Date(b.date) - new Date(a.date)));
        showToast(`✅ 已加入超商待出貨`);
      };

      const exportBackup = () => {
        const fullData = { storeRecords, marketRecords, reserveRecords };
        const blob = new Blob([JSON.stringify(fullData)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `向錢衝備份_${getTodayString()}.json`;
        a.click();
        setShowSettings(false);
      };

      const importBackup = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.storeRecords) setStoreRecords(data.storeRecords);
            if (data.marketRecords) setMarketRecords(data.marketRecords);
            if (data.reserveRecords) setReserveRecords(data.reserveRecords);
            showToast("✅ 資料還原成功！");
            setShowSettings(false);
          } catch(err) {
            alert("檔案格式錯誤！");
          }
        };
        reader.readAsText(file);
      };

      return (
        <div className="min-h-screen relative pb-safe">
          {toastMsg && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] animate-fade-in bg-gray-800 text-white px-5 py-3 rounded-full shadow-lg text-sm font-bold flex items-center gap-2 whitespace-nowrap">
              {toastMsg}
            </div>
          )}

          {showSettings && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[110] p-4 animate-fade-in">
              <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl">
                <div className="flex justify-between items-center mb-5">
                  <h3 className="text-xl font-bold text-[#5C4D42]">⚙️ 系統設定與備份</h3>
                  <button onClick={() => setShowSettings(false)} className="text-gray-400 hover:text-gray-600 text-xl">✖</button>
                </div>
                <div className="space-y-4">
                  <div className="bg-orange-50 p-4 rounded-xl border border-orange-100">
                    <p className="text-xs text-orange-800 mb-3">💡 建議定期匯出備份檔存至雲端硬碟，換手機時點擊匯入即可無痛轉移！</p>
                    <div className="flex gap-3">
                      <button onClick={exportBackup} className="flex-1 bg-[#C3A995] text-white py-3 rounded-xl font-bold shadow-sm">📤 匯出備份</button>
                      <label className="flex-1 bg-white border-2 border-[#C3A995] text-[#C3A995] py-3 rounded-xl font-bold text-center cursor-pointer shadow-sm">
                        📥 匯入還原
                        <input type="file" accept=".json" onChange={importBackup} className="hidden" />
                      </label>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {modalConfig.isOpen && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[110] p-4 animate-fade-in">
              <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl">
                <h3 className="text-xl font-bold mb-3 text-[#5C4D42] flex items-center gap-2">
                  {modalConfig.isDanger ? '⚠️' : '📦'} {modalConfig.title}
                </h3>
                <p className="text-gray-600 mb-4 whitespace-pre-line text-sm leading-relaxed">{modalConfig.message}</p>
                {modalConfig.showStoreSelect && (
                  <div className="mb-6 p-3 bg-gray-50 rounded-xl border border-gray-100">
                    <label className="block text-sm font-bold mb-2 text-gray-700">🏪 寄件超商</label>
                    <select value={modalStoreType} onChange={e => setModalStoreType(e.target.value)} className="w-full p-3 border rounded-lg bg-white outline-none" style={{ borderColor: THEME.secondary }}>
                      <option value="7-11">7-11 (運費 $38)</option>
                      <option value="全家">全家 (運費 $39)</option>
                    </select>
                  </div>
                )}
                <div className="flex gap-3 justify-end mt-2">
                  <button onClick={()=>setModalConfig(p=>({...p, isOpen:false}))} className="px-5 py-3 bg-gray-100 rounded-xl text-gray-600 font-bold transition">取消</button>
                  <button onClick={modalConfig.onConfirm} className={`px-5 py-3 text-white rounded-xl font-bold transition shadow-sm ${modalConfig.isDanger ? 'bg-red-500' : 'bg-[#C3A995]'}`}>{modalConfig.confirmText}</button>
                </div>
              </div>
            </div>
          )}

          <header className="text-white shadow-md p-4 sticky top-0 z-50 bg-[#C3A995]">
            <div className="max-w-4xl mx-auto flex justify-between items-center">
              <h1 className="text-2xl font-bold tracking-wider flex items-center gap-2">💰 向錢衝</h1>
              <button onClick={() => setShowSettings(true)} className="bg-white/20 p-2 rounded-full shadow-inner hover:bg-white/30 transition">⚙️</button>
            </div>
          </header>

          <main className="max-w-4xl mx-auto p-4">
            {activeTab === 'store' && <StoreManager records={storeRecords} setRecords={setStoreRecords} showModal={showModal} />}
            {activeTab === 'market' && <MarketManager records={marketRecords} setRecords={setMarketRecords} showModal={showModal} />}
            {activeTab === 'reports' && <ReportDashboard storeRecords={storeRecords} marketRecords={marketRecords} />}
            {activeTab === 'reserve' && <ReserveManager record
